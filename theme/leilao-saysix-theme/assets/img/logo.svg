<svg xmlns="http://www.w3.org/2000/svg" width="210" height="52" viewBox="0 0 210 52" fill="none" role="img" aria-label="Qatar Leilões">
  <title>Qatar Leilões</title>

  <!-- ─── ÍCONE: Casa + Martelo de leilão ─── -->

  <!-- Telhado -->
  <polygon points="26,5 2,27 50,27" fill="#1a5276"/>

  <!-- Paredes -->
  <rect x="8" y="26" width="36" height="24" rx="1" fill="#1a5276"/>

  <!-- Porta -->
  <rect x="20" y="35" width="12" height="15" rx="2" fill="#f8fafc"/>

  <!-- Janela esquerda -->
  <rect x="11" y="30" width="7" height="6" rx="1" fill="#f8fafc" opacity="0.75"/>

  <!-- Janela direita -->
  <rect x="30" y="30" width="7" height="6" rx="1" fill="#f8fafc" opacity="0.75"/>

  <!-- Cabo do martelo -->
  <line x1="35" y1="22" x2="48" y2="9" stroke="#e67e22" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Cabeça do martelo (retângulo rotacionado 45°) -->
  <rect x="43" y="5" width="13" height="6" rx="3" fill="#e67e22" transform="rotate(45 49.5 8)"/>

  <!-- ─── SEPARADOR ─── -->
  <line x1="64" y1="12" x2="64" y2="41" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ─── TEXTO ─── -->

  <!-- "Qatar" em azul-marinho bold -->
  <text x="74" y="29"
        font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="21"
        font-weight="800"
        fill="#1a5276">Qatar</text>

  <!-- "LEILÕES" em laranja, caixa-alta, tracking -->
  <text x="76" y="45"
        font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="11"
        font-weight="700"
        fill="#e67e22"
        letter-spacing="2.8">LEILÕES</text>
</svg>
