<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Imóvel - Qatar Leilões</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/wp-content/themes/leilao-saysix-theme/assets/img/favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    .imovel-detalhe { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
    .imovel-detalhe__voltar { display: inline-flex; align-items: center; gap: 6px; color: var(--cor-texto-muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; transition: color .2s; }
    .imovel-detalhe__voltar:hover { color: var(--cor-accent); }
    .imovel-detalhe__img-container { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 28px; background: var(--cor-bg-card); }
    .imovel-detalhe__img { width: 100%; display: block; border-radius: 16px; }
    .imovel-detalhe__badge { position: absolute; top: 16px; left: 16px; background: var(--cor-accent); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    .imovel-detalhe__favorito { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,.4); border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; }
    .imovel-detalhe__favorito:hover, .imovel-detalhe__favorito.ativo { background: var(--cor-accent); }

    .imovel-detalhe__topo { display: grid; grid-template-columns: 1fr 360px; gap: 28px; margin-bottom: 28px; align-items: start; }
    @media (max-width: 768px) { .imovel-detalhe__topo { grid-template-columns: 1fr; } }
    .imovel-detalhe__galeria-col { }
    .imovel-detalhe__galeria { }
    .imovel-detalhe__galeria .imovel-detalhe__img-container { margin-bottom: 10px; }
    .imovel-detalhe__nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,.5); border: none; color: #fff; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; z-index: 2; line-height: 1; }
    .imovel-detalhe__nav:hover { background: rgba(0,0,0,.75); }
    .imovel-detalhe__nav--prev { left: 12px; }
    .imovel-detalhe__nav--next { right: 12px; }
    .imovel-detalhe__contador { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,.6); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .imovel-detalhe__thumbs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .imovel-detalhe__thumb { width: 80px; height: 56px; object-fit: cover; border-radius: 8px; cursor: pointer; opacity: .5; transition: opacity .2s, border-color .2s; border: 2px solid transparent; flex-shrink: 0; }
    .imovel-detalhe__thumb:hover { opacity: .8; }
    .imovel-detalhe__thumb.ativo { opacity: 1; border-color: var(--cor-accent); }

    .imovel-detalhe__header { margin-bottom: 24px; }
    .imovel-detalhe__tipo { color: var(--cor-accent); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .imovel-detalhe__titulo { font-family: var(--ff-heading); font-size: 28px; font-weight: 700; color: var(--cor-texto); margin: 0 0 8px; }
    .imovel-detalhe__endereco { color: var(--cor-texto-muted); font-size: 15px; line-height: 1.5; }
    .imovel-detalhe__endereco-full { color: var(--cor-texto-sec); font-size: 14px; margin-top: 4px; }

    .imovel-detalhe__grid { display: grid; grid-template-columns: 1fr; gap: 32px; }

    .imovel-detalhe__info { display: flex; flex-direction: column; gap: 24px; }
    .imovel-detalhe__specs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .imovel-detalhe__spec { background: var(--cor-bg-card); border: 1px solid var(--cor-borda); border-radius: 12px; padding: 16px; text-align: center; }
    .imovel-detalhe__spec-icone { font-size: 24px; margin-bottom: 6px; }
    .imovel-detalhe__spec-valor { display: block; font-weight: 700; font-size: 18px; color: var(--cor-texto); }
    .imovel-detalhe__spec-label { font-size: 12px; color: var(--cor-texto-muted); text-transform: uppercase; letter-spacing: .3px; }

    .imovel-detalhe__descricao { background: var(--cor-bg-card); border: 1px solid var(--cor-borda); border-radius: 12px; padding: 24px; }
    .imovel-detalhe__descricao h3 { font-size: 16px; font-weight: 600; margin: 0 0 12px; color: var(--cor-texto); }
    .imovel-detalhe__descricao-texto { font-size: 14px; line-height: 1.7; color: var(--cor-texto-sec); white-space: pre-line; }

    .imovel-detalhe__sidebar { display: flex; flex-direction: column; gap: 20px; }

    .imovel-detalhe__preco-card { background: var(--cor-bg-card); border: 2px solid var(--cor-accent); border-radius: 16px; padding: 24px; }
    .imovel-detalhe__preco-label { font-size: 13px; color: var(--cor-texto-muted); margin-bottom: 4px; }
    .imovel-detalhe__preco { font-family: var(--ff-heading); font-size: 32px; font-weight: 800; color: var(--cor-accent); margin: 0; }
    .imovel-detalhe__avaliacao { font-size: 14px; color: var(--cor-texto-muted); margin-top: 8px; }
    .imovel-detalhe__avaliacao span { text-decoration: line-through; }
    .imovel-detalhe__desconto { display: inline-block; background: #16a34a; color: #fff; padding: 3px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-left: 8px; }
    .imovel-detalhe__leilao-info { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--cor-borda); display: flex; flex-direction: column; gap: 10px; }
    .imovel-detalhe__leilao-row { display: flex; justify-content: space-between; font-size: 14px; }
    .imovel-detalhe__leilao-row span:first-child { color: var(--cor-texto-muted); }
    .imovel-detalhe__leilao-row span:last-child { font-weight: 600; color: var(--cor-texto); }

    .imovel-detalhe__acoes { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .imovel-detalhe__btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
    .imovel-detalhe__btn--primario { background: var(--cor-accent); color: #fff; }
    .imovel-detalhe__btn--primario:hover { background: #c4411a; transform: translateY(-1px); }
    .imovel-detalhe__btn--secundario { background: var(--cor-bg-card); color: var(--cor-texto); border: 1px solid var(--cor-borda); }
    .imovel-detalhe__btn--secundario:hover { border-color: var(--cor-accent); color: var(--cor-accent); }

    .imovel-detalhe__mapa-card { background: var(--cor-bg-card); border: 1px solid var(--cor-borda); border-radius: 12px; padding: 24px; }
    .imovel-detalhe__mapa-card h3 { font-size: 16px; font-weight: 600; margin: 0 0 12px; }

    .imovel-detalhe__loading { text-align: center; padding: 80px 20px; color: var(--cor-texto-muted); font-size: 16px; }
    .imovel-detalhe__erro { text-align: center; padding: 80px 20px; }
    .imovel-detalhe__erro h2 { font-size: 24px; margin-bottom: 12px; }
    .imovel-detalhe__erro p { color: var(--cor-texto-muted); margin-bottom: 20px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="header__logo" aria-label="Qatar Leilões"><img src="/wp-content/themes/leilao-saysix-theme/assets/img/logo-white.svg" alt="Qatar Leilões" height="36" loading="eager"></a>
      <div class="header__busca">
        <svg class="header__busca-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="header__busca-input" placeholder="Buscar imóveis ou veículos..." onkeydown="if(event.key==='Enter')window.location.href='/?busca='+encodeURIComponent(this.value)">
      </div>
      <nav class="header__nav">
        <button class="btn btn--secundario" onclick="window.location.href='/'">← Voltar</button>
      </nav>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <div class="imovel-detalhe" id="conteudo">
    <div class="imovel-detalhe__loading" id="loading">
      Carregando detalhes do imóvel...
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <div>
          <div class="footer__logo"><img src="/wp-content/themes/leilao-saysix-theme/assets/img/logo-white.svg" alt="Qatar Leilões" height="32"></div>
          <p class="footer__descricao">Plataforma inteligente para leilões de imóveis e veículos da Caixa Econômica Federal.</p>
        </div>
      </div>
      <div class="footer__bottom">
        <p>© 2026 Qatar Leilões. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script>
    // Pegar ID da URL
    var params = new URLSearchParams(window.location.search);
    var imovelId = params.get('id');

    if (!imovelId) {
      mostrarErro();
    } else {
      carregarImovel(imovelId);
    }

    function carregarImovel(id) {
      fetch('/wp-json/leilao/v1/imoveis/' + id)
        .then(function(res) {
          if (!res.ok) throw new Error('Não encontrado');
          return res.json();
        })
        .then(function(item) {
          renderizarImovel(item);
        })
        .catch(function() {
          mostrarErro();
        });
    }

    function mostrarErro() {
      document.getElementById('conteudo').innerHTML = '\
        <div class="imovel-detalhe__erro">\
          <h2>Imóvel não encontrado</h2>\
          <p>O imóvel que você procura não existe ou foi removido.</p>\
          <a href="/" class="imovel-detalhe__btn imovel-detalhe__btn--primario" style="display:inline-flex;text-decoration:none">← Voltar para a página inicial</a>\
        </div>';
    }

    // Fallback images
    var IMAGENS_FALLBACK = {
      'apartamento': [
        'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=800&h=450&fit=crop',
        'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=800&h=450&fit=crop'
      ],
      'casa': [
        'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=800&h=450&fit=crop',
        'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=800&h=450&fit=crop'
      ],
      'terreno': [
        'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=800&h=450&fit=crop'
      ],
      'galpao': [
        'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=800&h=450&fit=crop'
      ],
      'default': [
        'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=800&h=450&fit=crop',
        'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=800&h=450&fit=crop'
      ]
    };

    function imagemFallback(tipo, id) {
      var tipoNorm = (tipo || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z]/g, '');
      var fotos = IMAGENS_FALLBACK[tipoNorm] || IMAGENS_FALLBACK['default'];
      return fotos[(id || 0) % fotos.length];
    }

    function renderizarImovel(item) {
      var avaliacao = parseFloat(item.valor_avaliacao) || 0;
      var minimo = parseFloat(item.valor_minimo) || 0;
      var desconto = avaliacao > 0 ? Math.round((1 - minimo / avaliacao) * 100) : 0;
      if (desconto < 0) desconto = 0;

      var dataFim = item.fim ? new Date(item.fim) : null;
      var dataInicio = item.inicio ? new Date(item.inicio) : null;
      var dataFimFormatada = dataFim ? dataFim.toLocaleDateString('pt-BR') : '—';
      var dataInicioFormatada = dataInicio ? dataInicio.toLocaleDateString('pt-BR') : '—';

      var imagem = item.thumb || '';
      if (!imagem && item.galeria && item.galeria.length) imagem = item.galeria[0].url;
      if (!imagem) imagem = imagemFallback(item.tipo, item.id);

      var endereco = item.endereco || '';
      var local = [item.cidade, item.estado].filter(Boolean).join(', ');

      // Atualizar título da página
      document.title = (item.titulo || 'Imóvel') + ' - Qatar Leilões';

      var html = '';

      // Voltar
      html += '<a href="/" class="imovel-detalhe__voltar">← Voltar para imóveis</a>';

      // Galeria de fotos
      var fotos = [];
      if (item.fotos_caixa && item.fotos_caixa.length) {
        fotos = item.fotos_caixa;
      } else if (item.galeria && item.galeria.length) {
        fotos = item.galeria.map(function(g) { return g.url; });
      }
      if (!fotos.length) fotos = [imagem];

      html += '<div class="imovel-detalhe__topo">';
      html += '<div class="imovel-detalhe__galeria-col">';
      html += '<div class="imovel-detalhe__galeria">';
      html += '  <div class="imovel-detalhe__img-container">';
      html += '    <img src="' + fotos[0] + '" alt="' + (item.titulo || '') + '" class="imovel-detalhe__img" id="fotoAtual" onerror="this.onerror=null;this.src=imagemFallback(\'' + (item.tipo || '') + '\',' + item.id + ')">';
      html += '    <span class="imovel-detalhe__badge">🔨 Leilão</span>';
      html += '    <button class="imovel-detalhe__favorito" onclick="this.classList.toggle(\'ativo\')">♥</button>';
      if (fotos.length > 1) {
        html += '    <button class="imovel-detalhe__nav imovel-detalhe__nav--prev" onclick="mudarFoto(-1)">‹</button>';
        html += '    <button class="imovel-detalhe__nav imovel-detalhe__nav--next" onclick="mudarFoto(1)">›</button>';
        html += '    <span class="imovel-detalhe__contador">' + '1/' + fotos.length + '</span>';
      }
      html += '  </div>';
      if (fotos.length > 1) {
        html += '  <div class="imovel-detalhe__thumbs">';
        for (var fi = 0; fi < fotos.length; fi++) {
          html += '    <img src="' + fotos[fi] + '" class="imovel-detalhe__thumb' + (fi === 0 ? ' ativo' : '') + '" onclick="irParaFoto(' + fi + ')" alt="Foto ' + (fi + 1) + '">';
        }
        html += '  </div>';
      }
      html += '</div>';

      // Specs (abaixo das fotos)
      html += '<div class="imovel-detalhe__specs" style="margin-top:16px">';
      if (item.area_total) {
        html += '<div class="imovel-detalhe__spec"><div class="imovel-detalhe__spec-icone">📐</div><span class="imovel-detalhe__spec-valor">' + item.area_total + 'm²</span><span class="imovel-detalhe__spec-label">Área Total</span></div>';
      }
      if (item.area_privativa) {
        html += '<div class="imovel-detalhe__spec"><div class="imovel-detalhe__spec-icone">🏠</div><span class="imovel-detalhe__spec-valor">' + item.area_privativa + 'm²</span><span class="imovel-detalhe__spec-label">Área Privativa</span></div>';
      }
      if (item.quartos) {
        html += '<div class="imovel-detalhe__spec"><div class="imovel-detalhe__spec-icone">🛏️</div><span class="imovel-detalhe__spec-valor">' + item.quartos + '</span><span class="imovel-detalhe__spec-label">Quartos</span></div>';
      }
      if (item.garagem) {
        html += '<div class="imovel-detalhe__spec"><div class="imovel-detalhe__spec-icone">🚗</div><span class="imovel-detalhe__spec-valor">' + item.garagem + '</span><span class="imovel-detalhe__spec-label">Vagas</span></div>';
      }
      if (item.modalidade) {
        html += '<div class="imovel-detalhe__spec"><div class="imovel-detalhe__spec-icone">⚖️</div><span class="imovel-detalhe__spec-valor">' + item.modalidade + '</span><span class="imovel-detalhe__spec-label">Modalidade</span></div>';
      }
      if (item.matricula) {
        html += '<div class="imovel-detalhe__spec"><div class="imovel-detalhe__spec-icone">📄</div><span class="imovel-detalhe__spec-valor">' + item.matricula + '</span><span class="imovel-detalhe__spec-label">Matrícula</span></div>';
      }
      html += '</div>';

      html += '</div>'; // fim galeria-col

      // Salvar fotos para navegação
      window._galeriaFotos = fotos;
      window._galeriaIndex = 0;

      // === SIDEBAR (ao lado da imagem) ===
      html += '<div class="imovel-detalhe__sidebar">';

      // Card de preço
      html += '<div class="imovel-detalhe__preco-card">';
      html += '  <div class="imovel-detalhe__preco-label">Lance mínimo</div>';
      html += '  <div class="imovel-detalhe__preco">R$ ' + minimo.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + '</div>';
      if (avaliacao > 0 && desconto > 0) {
        html += '  <div class="imovel-detalhe__avaliacao">Avaliação: <span>R$ ' + avaliacao.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + '</span>';
        html += '    <span class="imovel-detalhe__desconto">-' + desconto + '%</span>';
        html += '  </div>';
      }

      // Info do leilão
      html += '  <div class="imovel-detalhe__leilao-info">';
      html += '    <div class="imovel-detalhe__leilao-row"><span>Status</span><span>' + (item.status || '—') + '</span></div>';
      html += '    <div class="imovel-detalhe__leilao-row"><span>Início</span><span>' + dataInicioFormatada + '</span></div>';
      html += '    <div class="imovel-detalhe__leilao-row"><span>Encerramento</span><span>' + dataFimFormatada + '</span></div>';
      if (item.incremento) {
        html += '    <div class="imovel-detalhe__leilao-row"><span>Incremento</span><span>R$ ' + parseFloat(item.incremento).toLocaleString('pt-BR') + '</span></div>';
      }
      if (item.total_lances > 0) {
        html += '    <div class="imovel-detalhe__leilao-row"><span>Lances</span><span>' + item.total_lances + '</span></div>';
      }
      html += '  </div>';
      html += '</div>'; // fim preco-card

      // Botões de ação
      html += '<div class="imovel-detalhe__acoes">';
      html += '  <button class="imovel-detalhe__btn imovel-detalhe__btn--primario" onclick="darLance()">🔨 Dar Lance</button>';
      html += '  <button class="imovel-detalhe__btn imovel-detalhe__btn--secundario" onclick="this.classList.toggle(\'ativo\')">♥ Adicionar aos Favoritos</button>';
      html += '</div>';

      html += '</div>'; // fim sidebar
      html += '</div>'; // fim topo

      // Header
      html += '<div class="imovel-detalhe__header">';
      html += '  <div class="imovel-detalhe__tipo">' + (item.tipo || 'Imóvel') + '</div>';
      html += '  <h1 class="imovel-detalhe__titulo">' + (item.titulo || '') + '</h1>';
      html += '  <div class="imovel-detalhe__endereco">📍 ' + local + '</div>';
      if (endereco) {
        html += '  <div class="imovel-detalhe__endereco-full">' + endereco + '</div>';
      }
      html += '</div>';

      // Grid: info + sidebar
      html += '<div class="imovel-detalhe__grid">';

      // === INFO (largura total abaixo) ===
      html += '<div class="imovel-detalhe__info">';

      // Descrição
      var descricaoTexto = item.descricao || item.content || '';
      if (descricaoTexto) {
        html += '<div class="imovel-detalhe__descricao">';
        html += '  <h3>Descrição</h3>';
        html += '  <div class="imovel-detalhe__descricao-texto">' + descricaoTexto + '</div>';
        html += '</div>';
      }

      html += '</div>'; // fim info
      html += '</div>'; // fim grid

      document.getElementById('conteudo').innerHTML = html;
    }

    function mudarFoto(dir) {
      var fotos = window._galeriaFotos;
      if (!fotos || fotos.length <= 1) return;
      var idx = window._galeriaIndex + dir;
      if (idx < 0) idx = fotos.length - 1;
      if (idx >= fotos.length) idx = 0;
      irParaFoto(idx);
    }

    function irParaFoto(idx) {
      var fotos = window._galeriaFotos;
      if (!fotos || idx < 0 || idx >= fotos.length) return;
      window._galeriaIndex = idx;
      document.getElementById('fotoAtual').src = fotos[idx];
      var contador = document.querySelector('.imovel-detalhe__contador');
      if (contador) contador.textContent = (idx + 1) + '/' + fotos.length;
      var thumbs = document.querySelectorAll('.imovel-detalhe__thumb');
      thumbs.forEach(function(t, i) {
        t.classList.toggle('ativo', i === idx);
      });
    }

    function darLance() {
      alert('Para dar um lance, faça login ou crie uma conta.');
    }
  </script>
</body>
</html>
